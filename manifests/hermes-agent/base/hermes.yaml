---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-iscsi-hermes-data
  labels:
    app: hermes
spec:
  storageClassName: "freenas-iscsi-manual-csi"
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: org.democratic-csi.node-manual
    readOnly: false
    fsType: xfs
    volumeHandle: pv-iscsi-hermes-data
    volumeAttributes:
      portal: 10.10.30.43:3260
      iqn: iqn.2005-10.org.freenas.ctl:hermes-data
      lun: "0"
      node_attach_driver: iscsi
      provisioner_driver: node-manual

---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: pvc-iscsi-hermes-data
  labels:
    app: hermes
spec:
  storageClassName: freenas-iscsi-manual-csi
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeName: pv-iscsi-hermes-data

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  labels:
    app: hermes
data:
  config.yaml: |
    model:
      provider: custom
      model: gpt-4o-mini
      base_url: https://api.openai.com/v1

---
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  labels:
    app: hermes
type: Opaque
stringData:
  api-server-key: "47f20c2492770a25526e6a59475a7fbcda331326115c3ef7e6ad680c6715188f"

---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: hermes
  labels:
    app: hermes
spec:
  replicas: 0
  selector:
    matchLabels:
      app: hermes
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          image: "nousresearch/hermes-agent:latest"
          args:
            - "gateway"
            - "run"
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_TUI
              value: "1"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: api-server-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key-secret
                  key: api-token
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      restartPolicy: Always
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-iscsi-hermes-data
        - name: config
          configMap:
            name: hermes-config

---
kind: Service
apiVersion: v1
metadata:
  name: hermes-svc
  labels:
    app: hermes
spec:
  type: LoadBalancer
  loadBalancerIP: 10.10.30.13
  selector:
    app: hermes
  ports:
    - name: gateway
      protocol: TCP
      port: 8642
      targetPort: gateway
    - name: dashboard
      protocol: TCP
      port: 9119
      targetPort: dashboard

---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: hermes
  labels:
    app: hermes
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
  - hosts:
    - hermes.j3laserna.me
    secretName: wildcard-j3laserna-me-tls
  rules:
    - host: hermes.j3laserna.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes-svc
                port:
                  name: dashboard
