---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper
  labels:
    app: whisper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whisper
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: whisper
    spec:
      containers:
        - name: whisper
          image: docker.io/rhasspy/wyoming-whisper:latest
          args:
            - "--model"
            - "tiny-int8"
            - "--language"
            - "en"
          ports:
            - name: wyoming
              containerPort: 10300
              protocol: TCP
          volumeMounts:
            - name: whisper-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            tcpSocket:
              port: wyoming
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: wyoming
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      restartPolicy: Always
      volumes:
        - name: whisper-data
          emptyDir: {}

---
kind: Service
apiVersion: v1
metadata:
  name: whisper-svc
  labels:
    app: whisper
spec:
  type: ClusterIP
  selector:
    app: whisper
  ports:
    - name: wyoming
      protocol: TCP
      port: 10300
      targetPort: wyoming
